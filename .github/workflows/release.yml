name: Release and Publish

on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: '[Dry run] Version to simulate (e.g. 2.0.0). Will NOT publish, tag, or create a release.'
        required: true
        type: string

jobs:
  release:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/') &&
      github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating GitHub releases
      id-token: write # Required for npm trusted publishing (OIDC) and provenance

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || 'main' }}

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            BRANCH_NAME="${{ github.event.pull_request.head.ref }}"
            VERSION=${BRANCH_NAME#release/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm for OIDC trusted publishing support
        run: npm install -g npm@11.12.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint code
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build distribution
        run: bun run build

      - name: Verify package contents
        run: |
          echo "Package will include these files:"
          npm pack --dry-run

      - name: Sync version to release target
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION#v}"
          echo "export const VERSION = '$SEMVER'" > src/version.ts
          npm version "$SEMVER" --no-git-tag-version --allow-same-version

      - name: Commit if changed, then tag
        if: github.event_name != 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SEMVER="${VERSION#v}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/version.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore: sync version.ts to $SEMVER"
            git push origin main
          fi
          git fetch --tags origin
          TAG="${{ steps.version.outputs.version }}"
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            EXISTING=$(git rev-parse "refs/tags/$TAG")
            CURRENT=$(git rev-parse HEAD)
            if [ "$EXISTING" != "$CURRENT" ]; then
              echo "::error::Tag $TAG exists but points to $EXISTING, not current HEAD $CURRENT"
              exit 1
            fi
            echo "Tag $TAG already exists and points to HEAD, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Publish to npm
        run: npm publish ${{ github.event_name == 'workflow_dispatch' && '--dry-run' || '--provenance' }} --access public

      - name: Create GitHub Release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## Installation
            ```bash
            npm install inoreader-js@${{ steps.version.outputs.version }}
            ```

            ## What's Changed
            <!-- Auto-generated release notes will appear below -->
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

